<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT Web Chat</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #343541;
      color: #ececf1;
      height: 100vh;
      overflow: hidden;
    }

    #root {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background-color: #202123;
      border-bottom: 1px solid #4d4d4f;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .gear-button {
      background: none;
      border: none;
      color: #ececf1;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s;
    }

    .gear-button:hover {
      background-color: #40414f;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
    }

    .message {
      padding: 20px;
      max-width: 768px;
      margin: 0 auto;
      display: flex;
      gap: 16px;
      line-height: 1.7;
    }

    .message.user {
      background-color: #343541;
    }

    .message.assistant {
      background-color: #444654;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .message-avatar.user-avatar {
      background-color: #5436da;
    }

    .message-avatar.assistant-avatar {
      background-color: #19c37d;
    }

    .message-content {
      flex: 1;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-content p {
      margin-bottom: 8px;
    }

    .message-content p:last-child {
      margin-bottom: 0;
    }

    .message-content code {
      background-color: #1a1a2e;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }

    .message-content pre {
      background-color: #1a1a2e;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .message-content pre code {
      background: none;
      padding: 0;
    }

    .input-area {
      padding: 20px;
      background-color: #343541;
    }

    .input-wrapper {
      max-width: 768px;
      margin: 0 auto;
      position: relative;
    }

    .input-wrapper textarea {
      width: 100%;
      padding: 14px 50px 14px 16px;
      border: 1px solid #4d4d4f;
      border-radius: 12px;
      background-color: #40414f;
      color: #ececf1;
      font-size: 16px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
    }

    .input-wrapper textarea::placeholder {
      color: #8e8ea0;
    }

    .input-wrapper textarea:focus {
      border-color: #6b6b7b;
    }

    .send-button {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background-color: #19c37d;
      color: white;
      border: none;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .send-button:hover {
      background-color: #1a9d6a;
    }

    .send-button:disabled {
      background-color: #4d4d4f;
      cursor: not-allowed;
    }

    .disclaimer {
      text-align: center;
      font-size: 12px;
      color: #8e8ea0;
      padding: 8px 0 12px;
      max-width: 768px;
      margin: 0 auto;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background-color: #202123;
      border: 1px solid #4d4d4f;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 480px;
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 14px;
      color: #8e8ea0;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #c5c5d2;
    }

    .modal input[type="password"],
    .modal input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #4d4d4f;
      border-radius: 8px;
      background-color: #40414f;
      color: #ececf1;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }

    .modal input:focus {
      border-color: #6b6b7b;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-buttons button {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s;
    }

    .btn-cancel {
      background-color: #40414f;
      color: #ececf1;
    }

    .btn-cancel:hover {
      background-color: #4d4d4f;
    }

    .btn-save {
      background-color: #19c37d;
      color: white;
    }

    .btn-save:hover {
      background-color: #1a9d6a;
    }

    .btn-delete {
      background-color: #ef4444;
      color: white;
    }

    .btn-delete:hover {
      background-color: #dc2626;
    }

    /* Typing indicator */
    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background-color: #8e8ea0;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .welcome h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .welcome p {
      color: #8e8ea0;
      font-size: 16px;
      text-align: center;
      max-width: 500px;
      line-height: 1.6;
    }

    /* Error message */
    .error-message {
      background-color: #ef4444;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      margin: 8px auto;
      max-width: 768px;
      font-size: 14px;
    }

    /* Model selector in modal */
    .modal select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #4d4d4f;
      border-radius: 8px;
      background-color: #40414f;
      color: #ececf1;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .modal select:focus {
      border-color: #6b6b7b;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #4d4d4f;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #6b6b7b;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // SVG Icons
    const GearIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
    );

    const SendIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
      </svg>
    );

    // Settings Modal Component
    function SettingsModal({ isOpen, onClose, apiKey, onSave, model, onModelChange }) {
      const [inputKey, setInputKey] = useState(apiKey);
      const [selectedModel, setSelectedModel] = useState(model);

      useEffect(() => {
        setInputKey(apiKey);
        setSelectedModel(model);
      }, [apiKey, model, isOpen]);

      if (!isOpen) return null;

      const handleSave = () => {
        onSave(inputKey.trim());
        onModelChange(selectedModel);
        onClose();
      };

      const handleDelete = () => {
        onSave('');
        onClose();
      };

      const handleOverlayClick = (e) => {
        if (e.target === e.currentTarget) {
          onClose();
        }
      };

      return (
        <div className="modal-overlay" onClick={handleOverlayClick}>
          <div className="modal">
            <h2>Settings</h2>
            <p>
              APIキーはブラウザのローカルストレージに保存されます。サーバーには送信されません。
            </p>
            <label htmlFor="api-key-input">OpenAI API Key</label>
            <input
              id="api-key-input"
              type="password"
              value={inputKey}
              onChange={(e) => setInputKey(e.target.value)}
              placeholder="sk-..."
              autoFocus
            />
            <label htmlFor="model-select">Model</label>
            <select
              id="model-select"
              value={selectedModel}
              onChange={(e) => setSelectedModel(e.target.value)}
            >
              <option value="gpt-4o">gpt-4o</option>
              <option value="gpt-4o-mini">gpt-4o-mini</option>
              <option value="gpt-4-turbo">gpt-4-turbo</option>
              <option value="gpt-4">gpt-4</option>
              <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
            </select>
            <div className="modal-buttons">
              {apiKey && (
                <button className="btn-delete" onClick={handleDelete}>
                  Delete Key
                </button>
              )}
              <button className="btn-cancel" onClick={onClose}>
                Cancel
              </button>
              <button className="btn-save" onClick={handleSave}>
                Save
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Message Component
    function Message({ role, content }) {
      const formatContent = (text) => {
        // Simple markdown-like formatting
        const parts = text.split(/(```[\s\S]*?```)/g);
        return parts.map((part, i) => {
          if (part.startsWith('```') && part.endsWith('```')) {
            const code = part.slice(3, -3).replace(/^\w*\n/, '');
            return <pre key={i}><code>{code}</code></pre>;
          }
          // Handle inline code
          const inlineParts = part.split(/(`[^`]+`)/g);
          return (
            <p key={i}>
              {inlineParts.map((ip, j) => {
                if (ip.startsWith('`') && ip.endsWith('`')) {
                  return <code key={j}>{ip.slice(1, -1)}</code>;
                }
                return ip;
              })}
            </p>
          );
        });
      };

      return (
        <div className={`message ${role}`}>
          <div className={`message-avatar ${role}-avatar`}>
            {role === 'user' ? 'You' : 'AI'}
          </div>
          <div className="message-content">
            {formatContent(content)}
          </div>
        </div>
      );
    }

    // Typing Indicator Component
    function TypingIndicator() {
      return (
        <div className="message assistant">
          <div className="message-avatar assistant-avatar">AI</div>
          <div className="message-content">
            <div className="typing-indicator">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      );
    }

    // Welcome Screen Component
    function WelcomeScreen() {
      return (
        <div className="welcome">
          <h2>ChatGPT Web Chat</h2>
          <p>
            OpenAI APIを使用してChatGPTとチャットできます。
            右上の歯車アイコンからAPIキーを設定してください。
          </p>
        </div>
      );
    }

    // Main App Component
    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState('');
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [apiKey, setApiKey] = useState(() => {
        return localStorage.getItem('openai-api-key') || '';
      });
      const [model, setModel] = useState(() => {
        return localStorage.getItem('openai-model') || 'gpt-4o';
      });

      const chatEndRef = useRef(null);
      const textareaRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isLoading]);

      const handleSaveApiKey = (key) => {
        setApiKey(key);
        if (key) {
          localStorage.setItem('openai-api-key', key);
        } else {
          localStorage.removeItem('openai-api-key');
        }
      };

      const handleModelChange = (m) => {
        setModel(m);
        localStorage.setItem('openai-model', m);
      };

      const adjustTextareaHeight = () => {
        const textarea = textareaRef.current;
        if (textarea) {
          textarea.style.height = 'auto';
          textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }
      };

      const sendMessage = useCallback(async () => {
        const trimmedInput = input.trim();
        if (!trimmedInput || isLoading) return;

        if (!apiKey) {
          setError('APIキーが設定されていません。右上の歯車アイコンから設定してください。');
          return;
        }

        setError('');
        const userMessage = { role: 'user', content: trimmedInput };
        const newMessages = [...messages, userMessage];
        setMessages(newMessages);
        setInput('');
        setIsLoading(true);

        // Reset textarea height
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
        }

        try {
          const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
              model: model,
              messages: newMessages.map(m => ({ role: m.role, content: m.content })),
              temperature: 0.7,
            }),
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            if (response.status === 401) {
              throw new Error('APIキーが無効です。設定を確認してください。');
            } else if (response.status === 429) {
              throw new Error('リクエスト制限に達しました。しばらくしてからお試しください。');
            } else {
              throw new Error(errorData.error?.message || `API Error: ${response.status}`);
            }
          }

          const data = await response.json();
          const assistantMessage = {
            role: 'assistant',
            content: data.choices[0].message.content,
          };
          setMessages([...newMessages, assistantMessage]);
        } catch (err) {
          setError(err.message || 'エラーが発生しました。');
        } finally {
          setIsLoading(false);
        }
      }, [input, isLoading, apiKey, messages, model]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      return (
        <>
          <div className="header">
            <h1>ChatGPT Web Chat</h1>
            <button
              className="gear-button"
              onClick={() => setSettingsOpen(true)}
              title="Settings"
            >
              <GearIcon />
            </button>
          </div>

          {messages.length === 0 && !isLoading ? (
            <WelcomeScreen />
          ) : (
            <div className="chat-container">
              {messages.map((msg, idx) => (
                <Message key={idx} role={msg.role} content={msg.content} />
              ))}
              {isLoading && <TypingIndicator />}
              <div ref={chatEndRef} />
            </div>
          )}

          {error && (
            <div className="error-message">
              {error}
            </div>
          )}

          <div className="input-area">
            <div className="input-wrapper">
              <textarea
                ref={textareaRef}
                value={input}
                onChange={(e) => {
                  setInput(e.target.value);
                  adjustTextareaHeight();
                }}
                onKeyDown={handleKeyDown}
                placeholder="Send a message..."
                rows={1}
                disabled={isLoading}
              />
              <button
                className="send-button"
                onClick={sendMessage}
                disabled={isLoading || !input.trim()}
                title="Send"
              >
                <SendIcon />
              </button>
            </div>
            <div className="disclaimer">
              APIキーはブラウザのローカルストレージにのみ保存され、外部に送信されません。
            </div>
          </div>

          <SettingsModal
            isOpen={settingsOpen}
            onClose={() => setSettingsOpen(false)}
            apiKey={apiKey}
            onSave={handleSaveApiKey}
            model={model}
            onModelChange={handleModelChange}
          />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
